[flake8]
# Máximo de caracteres por línea (por defecto es 79, aquí lo subimos a 130)
max-line-length = 130  

# Ignorar errores específicos
ignore = E203, E266, E501, W503  

# Excluir estas carpetas del análisis de `flake8`
exclude = 
    .git,
    __pycache__,
    migrations,
    venv,
    env,
    .venv

# Mostrar estadísticas de errores
statistics = True  

# Mostrar número de errores en la salida
count = True  

# Mostrar la línea de código donde ocurre el error
show-source = True  
